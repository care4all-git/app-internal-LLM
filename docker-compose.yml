services:
  internal-vllm:
    build: ./vllm
    container_name: internal-vllm
    environment:
      - VLLM_MODEL=${VLLM_MODEL}
      - VLLM_DTYPE=${VLLM_DTYPE:-auto}
      - VLLM_QUANTIZATION=${VLLM_QUANTIZATION:-}
      - VLLM_GPU_MEM_UTIL=${VLLM_GPU_MEM_UTIL:-0.90}
      - VLLM_MAX_MODEL_LEN=${VLLM_MAX_MODEL_LEN:-32768}
      - VLLM_TENSOR_PARALLEL=${VLLM_TENSOR_PARALLEL:-1}
      - VLLM_MAX_NUM_SEQS=${VLLM_MAX_NUM_SEQS:-256}
      - VLLM_SERVED_NAME=${VLLM_SERVED_NAME:-}
      - VLLM_ENABLE_TOOLS=${VLLM_ENABLE_TOOLS:-false}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    ports:
      - "8000:8000"
    volumes:
      # Cache downloaded HF models so restarts don't re-download
      - vllm_hf_cache:/root/.cache/huggingface
    networks:
      - internal-devstral-network
    deploy:
      resources:
        limits:
          cpus: ${VLLM_CPU:-4.0}
          memory: ${VLLM_MEMORY:-28G}
        reservations:
          cpus: ${VLLM_CPU:-4.0}
          memory: ${VLLM_MEMORY:-28G}
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  internal-redis:
    build: ./redis
    container_name: internal-redis
    ports:
      - "6379:6379"
    volumes:
      - ./volumes/redis/redis_data:/data
      - ./volumes/redis/redis_logs:/var/log/redis
    networks:
      - internal-devstral-network
    deploy:
      resources:
        limits:
          cpus: ${REDIS_CPU}
          memory: ${REDIS_MEMORY}
        reservations:
          cpus: ${REDIS_CPU}
          memory: ${REDIS_MEMORY}
    restart: unless-stopped

  internal-nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: internal-nginx
    ports:
      - "443:443"
    volumes:
      - ./volumes/nginx/nginx_logs:/var/log/nginx
    networks:
      - internal-devstral-network
    depends_on:
      - internal-redis
      - internal-vllm
    deploy:
      resources:
        limits:
          cpus: ${NGINX_CPU}
          memory: ${NGINX_MEMORY}
        reservations:
          cpus: ${NGINX_CPU}
          memory: ${NGINX_MEMORY}
    restart: unless-stopped

networks:
  internal-devstral-network:
    driver: bridge

volumes:
  vllm_hf_cache:
    driver: local
