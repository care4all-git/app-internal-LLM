services:
  internal-ollama:
    build: ./ollama
    container_name: internal-ollama
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-none}
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_ORIGINS=*
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-999h}
      - OLLAMA_MAX_LOADED_MODELS=1
      - REDIS_HOST=internal-redis
      - REDIS_PORT=6379
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - internal-network
    depends_on:
      - internal-redis
    deploy:
      resources:
        limits:
          cpus: ${OLLAMA_CPU:-4.0}
          memory: ${OLLAMA_MEMORY:-16G}
        reservations:
          cpus: ${OLLAMA_CPU:-4.0}
          memory: ${OLLAMA_MEMORY:-16G}
    restart: unless-stopped

  internal-redis:
    build: ./redis
    container_name: internal-redis
    ports:
      - "6379:6379"
    volumes:
      - ./volumes/redis/redis_data:/data
      - ./volumes/redis/redis_logs:/var/log/redis
    networks:
      - internal-network
    deploy:
      resources:
        limits:
          cpus: ${REDIS_CPU:-0.5}
          memory: ${REDIS_MEMORY:-1G}
        reservations:
          cpus: ${REDIS_CPU:-0.5}
          memory: ${REDIS_MEMORY:-1G}
    restart: unless-stopped

  internal-nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: internal-nginx
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - REDIS_HOST=internal-redis
      - REDIS_PORT=6379
    ports:
      - "443:443"
    volumes:
      - ./volumes/nginx/nginx_logs:/var/log/nginx
      - ./nginx/static:/usr/local/nginx/html/static:ro
    networks:
      - internal-network
    depends_on:
      - internal-redis
      - internal-ollama
    deploy:
      resources:
        limits:
          cpus: ${NGINX_CPU:-0.5}
          memory: ${NGINX_MEMORY:-1G}
        reservations:
          cpus: ${NGINX_CPU:-0.5}
          memory: ${NGINX_MEMORY:-1G}
    restart: unless-stopped

networks:
  internal-network:
    driver: bridge

volumes:
  ollama_models:
    driver: local
