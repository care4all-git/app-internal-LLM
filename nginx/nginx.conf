worker_processes auto;
error_log /var/log/nginx/error.log info;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      mime.types;
    default_type application/octet-stream;

    # DNS resolver for Docker services
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Large uploads
    client_max_body_size    100M;
    client_body_buffer_size 1M;
    client_body_timeout     300s;
    client_header_timeout   60s;
    send_timeout            0;

    # No buffering for SSE streaming
    sendfile    off;
    tcp_nodelay on;
    keepalive_timeout 0;

    client_body_temp_path /tmp/nginx_uploads;

    # ── Chat module global configuration ──────────────────────
    chat_redis_host         internal-redis;
    chat_redis_port         6379;
    chat_model_url          http://internal-vllm:8000;
    chat_model_name         devstral;
    chat_model_temperature  0.7;
    chat_model_top_p        0.9;
    chat_model_top_k        40;
    chat_model_num_ctx      8192;
    chat_model_repeat_penalty 1.1;
    chat_admin_password     changeme;

    server {
        listen      443;
        server_name localhost;

        add_header X-Frame-Options          "DENY"                         always;
        add_header X-Content-Type-Options   "nosniff"                      always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

        # ── Static HTML chat page ──────────────────────────────
        location = / {
            chat_root;
        }

        # ── Static assets ──────────────────────────────────────
        location /static/ {
            chat_static;
        }

        # ── API: create chat ───────────────────────────────────
        location = /api/chat/create {
            chat_create;
        }

        # ── API: streaming chat (SSE) ──────────────────────────
        location = /api/chat/stream {
            # No buffering for real-time SSE
            add_header X-Accel-Buffering no;
            chat_stream;
        }

        # ── API: continue incomplete response ──────────────────
        location = /api/chat/continue {
            add_header X-Accel-Buffering no;
            chat_continue;
        }

        # ── API: chat history ──────────────────────────────────
        location = /api/chat/history {
            chat_history;
        }

        # ── API: chat list ─────────────────────────────────────
        location = /api/chat/list {
            chat_list;
        }

        # ── API: clear chat ────────────────────────────────────
        location = /api/chat/clear {
            chat_clear;
        }

        # ── API: delete chat ───────────────────────────────────
        location = /api/chat/delete {
            chat_delete;
        }

        # ── API: delete all chats ──────────────────────────────
        location = /api/chat/delete-all {
            chat_delete_all;
        }

        # ── API: artifacts ─────────────────────────────────────
        location = /api/chat/artifacts {
            chat_artifacts;
        }

        # ── API: export artifacts ──────────────────────────────
        location = /api/chat/export {
            chat_export;
        }

        # ── API: message details ───────────────────────────────
        location = /api/message/details {
            chat_message_details;
        }

        # ── API: health check ──────────────────────────────────
        location = /api/health {
            chat_health;
        }

        # ── API: docs ──────────────────────────────────────────
        location = /api/docs {
            chat_docs;
        }

        # ── API: runtime config (GET=read, POST=update) ────────
        location = /api/config {
            chat_config;
        }

        # ── API: Ollama model management ───────────────────────
        location = /api/models {
            chat_models_list;
        }

        location = /api/models/delete {
            chat_models_delete;
        }

        location = /api/models/pull {
            add_header X-Accel-Buffering no;
            chat_models_pull;
        }

        # ── API: HuggingFace browser ───────────────────────────
        location = /api/hf/search {
            chat_hf_search;
        }

        location = /api/hf/files {
            chat_hf_files;
        }

        # ── Auth endpoints ─────────────────────────────────────────
        location = /api/auth/status {
            chat_auth_status;
        }

        location = /api/auth/login {
            chat_auth_login;
        }

        location = /api/auth/logout {
            chat_auth_logout;
        }

        # ── Status page ────────────────────────────────────────
        location = /status {
            chat_status;
        }

        # ── robots.txt ─────────────────────────────────────────
        location = /robots.txt {
            default_type text/plain;
            return 200 "User-agent: *\nDisallow: /api/\nDisallow: /static/\nAllow: /\n";
        }

        # ── Catch-all 404 ──────────────────────────────────────
        location / {
            return 404 '{"error":"Not Found","status":404}';
            default_type application/json;
        }
    }
}
