<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Internal Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background:#0d1117; color:#c9d1d9; min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .login-card { background:#161b22; border:1px solid #30363d; border-radius:12px; padding:2rem; width:100%; max-width:360px; }
        .login-card h1 { font-size:1.4rem; }
        .form-control { background:#0d1117; border-color:#30363d; color:#c9d1d9; }
        .form-control:focus { background:#0d1117; border-color:#58a6ff; color:#c9d1d9; box-shadow:0 0 0 3px rgba(88,166,255,.2); }
        .btn-primary { background:#1f6feb; border-color:#1f6feb; }
        .error-msg { color:#f85149; font-size:.85rem; margin-top:.5rem; display:none; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="text-center mb-4">
        <i class="bi bi-lightning-charge-fill text-primary" style="font-size:2rem;"></i>
        <h1 class="mt-2">Admin Login</h1>
        <p class="text-secondary" style="font-size:.85rem;">Internal Chat — Model Manager</p>
    </div>
    <form id="login-form" onsubmit="doLogin(event)">
        <div class="mb-3">
            <label class="form-label text-secondary" style="font-size:.82rem;">Password</label>
            <input type="password" class="form-control" id="password" autocomplete="current-password" autofocus required>
        </div>
        <div class="error-msg" id="error-msg"></div>
        <button type="submit" class="btn btn-primary w-100 mt-2" id="login-btn">
            <i class="bi bi-box-arrow-in-right me-1"></i>Login
        </button>
    </form>
    <div class="text-center mt-3">
        <a href="/" class="text-secondary" style="font-size:.8rem;">← Back to Chat</a>
    </div>
</div>
<script>
async function doLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('error-msg');
    const pw  = document.getElementById('password').value;
    err.style.display = 'none';
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
    try {
        const r = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({password: pw})
        });
        const data = await r.json();
        if (r.ok) {
            window.location.href = '/static/models.html';
        } else {
            err.textContent = data.error || 'Invalid password';
            err.style.display = 'block';
        }
    } catch(ex) {
        err.textContent = 'Connection error: ' + ex.message;
        err.style.display = 'block';
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-1"></i>Login';
    }
}

// If already admin, redirect immediately
fetch('/api/auth/status').then(r=>r.json()).then(d=>{
    if(d.type==='admin') window.location.href='/static/models.html';
});
</script>
</body>
</html>
